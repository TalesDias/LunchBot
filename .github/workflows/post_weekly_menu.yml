name: Post Weekly Menu

on:
  schedule:
    - cron: '0 9 * * 0' 
  workflow_dispatch:

jobs:
  send_menu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        
      - name: Install Portuguese locale
        run: sudo locale-gen pt_BR.UTF-8

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      
      - run: uv sync

      - run: uv run python send_weekly.py
        env:
          GREEN_API_INSTANCE_ID: ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          GREEN_API_RECEIVER_ID: ${{ secrets.GREEN_API_RECEIVER_ID }}
          

  notify_failure:
    needs: send_menu
    if: failure()
    uses: ./.github/workflows/notify_failure.yml
    secrets: inherit